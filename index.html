  <!-- 
    NAVIGATION DOCUMENTATION
    ========================
    
    How to Navigate Between Pages:
    
    1. Using HTML Anchor Tags (<a>):
       - The <a> tag creates a hyperlink to navigate to another page
       - The 'href' attribute specifies the destination file path
       - Syntax: <a href="filename.html">Link Text</a>
       
    2. Example Navigation Structure:
       - href="about.html"    → Navigates to the About Us page
       - href="login.html"    → Navigates to the Login/Authentication page
       - href="index.html"    → Navigates back to the Home page
       
    3. How It Works:
       - When a user clicks on the link, the browser loads the specified HTML file
       - The file path is relative to the current directory
       - No special scripts or handlers needed for basic page navigation
       
    4. File Paths:
       - Use relative paths for files in the same directory
       - Example: <a href="about.html"> (points to about.html in the same folder)
       - For subdirectories: <a href="folder/file.html">
  -->
  
  <!-- Navigation Link to About Page -->
  <a href="about.html">Home</a>
  
</body>
</html>
